<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="AVbot, the Web3 native Discord engine. Verification, roles, raids, engagement, protection, and more. All in one bot."
    />
    <meta property="og:title" content="AVbot" />
    <meta property="og:description" content="AVbot, the Web3 native Discord engine. Verification, roles, raids, engagement, protection, and more. All in one bot." />
    <meta property="og:image" content="https://cdn.avbot.app/1199707792706117642/2e6734d8c9fc47fab6b8525a57374de3.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AVbot" />
    <meta name="twitter:image" content="https://cdn.avbot.app/1199707792706117642/2e6734d8c9fc47fab6b8525a57374de3.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>AVbot</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    <!--
      Cloudflare Web Analytics (privacy friendly, no cookies). The token is
      injected at build time from the REACT_APP_CF_BEACON env var; set it in the
      hosting environment. If it is empty the beacon simply does nothing.
      Visitor stats (views, countries, referrers) are viewed in the Cloudflare
      dashboard, not in this app.
    -->
    <script defer src="https://static.cloudflareinsights.com/beacon.min.js"
            data-cf-beacon='{"token": "%REACT_APP_CF_BEACON%"}'></script>
  </body>
</html>
